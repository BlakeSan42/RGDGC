name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'mobile/**'
      - 'admin-dashboard/**'
      - 'mcp-server/**'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + type-check + tests ──
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: rgdgc_test
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: rgdgc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rgdgc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check . --select E,W,F --ignore E501
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://rgdgc_test:test_pass@localhost:5432/rgdgc_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret
          JWT_SECRET: test-jwt-secret
          ENVIRONMENT: test
        run: pytest tests/test_points.py tests/test_putting_model.py -v --tb=short

  # ── Mobile: type-check ──
  mobile:
    name: Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── Admin Dashboard: build ──
  admin-dashboard:
    name: Admin Dashboard CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Check if admin-dashboard exists
        id: check
        run: test -f package.json && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Type check
        if: steps.check.outputs.exists == 'true'
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
        env:
          VITE_API_URL: https://api.rgdgc.com

  # ── MCP Server: type-check + build ──
  mcp-server:
    name: MCP Server CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check & build
        run: npm run build
