name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'mobile/**'
      - 'admin-dashboard/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - backend
          - mobile-ota
          - mobile-build
          - admin-dashboard
          - all

jobs:
  # ── Backend → Railway (auto-deploy via GitHub integration) ──
  # Railway watches the `backend/` directory and auto-deploys on push.
  # This job just logs what happened for traceability.
  backend-deploy:
    name: Backend (Railway)
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'backend/') ||
      github.event.inputs.target == 'backend' ||
      github.event.inputs.target == 'all'
    steps:
      - name: Deploy summary
        run: |
          echo "## Backend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Railway auto-deploys from \`backend/\` on push to main." >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**By:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ── Mobile OTA Update (JS-only changes, instant) ──
  mobile-ota:
    name: Mobile OTA Update
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.target == 'mobile-ota' ||
      github.event.inputs.target == 'all'
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch production --message "OTA from ${{ github.sha }}"

      - name: Summary
        run: |
          echo "## Mobile OTA Update" >> $GITHUB_STEP_SUMMARY
          echo "Published OTA update to production branch." >> $GITHUB_STEP_SUMMARY
          echo "Users will receive the update on next app launch." >> $GITHUB_STEP_SUMMARY

  # ── Mobile Native Build (requires app store submission) ──
  mobile-build:
    name: Mobile Native Build
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'mobile-build'
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive

      - name: Summary
        run: |
          echo "## Mobile Native Build" >> $GITHUB_STEP_SUMMARY
          echo "EAS builds queued for iOS and Android." >> $GITHUB_STEP_SUMMARY
          echo "Check https://expo.dev for build status." >> $GITHUB_STEP_SUMMARY

  # ── Admin Dashboard → Vercel (auto-deploy via GitHub integration) ──
  admin-deploy:
    name: Admin Dashboard
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'admin-dashboard/') ||
      github.event.inputs.target == 'admin-dashboard' ||
      github.event.inputs.target == 'all'
    steps:
      - name: Deploy summary
        run: |
          echo "## Admin Dashboard Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Vercel auto-deploys from \`admin-dashboard/\` on push to main." >> $GITHUB_STEP_SUMMARY
